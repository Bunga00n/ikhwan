<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luahan Hati</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cormorant Garamond', serif;
}
.fade {
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}
.fade.show {
    opacity: 1;
}
</style>
</head>

<body class="bg-neutral-950 text-neutral-200 min-h-screen flex items-center justify-center px-6">

<div class="max-w-2xl text-center space-y-10 fade show">

    <!-- INTRO PAGE -->
    <div id="intro">
        <h1 class="text-3xl md:text-4xl leading-relaxed font-semibold">
            Teruntuk awak,<br>
            sudikah awak membaca luahan saya?
        </h1>

        <div class="flex justify-center gap-6 mt-10">
            <button onclick="startReading()" 
                class="px-6 py-2 border border-neutral-400 hover:bg-neutral-800 transition duration-500">
                Yes
            </button>

            <button onclick="declineReading()" 
                class="px-6 py-2 border border-neutral-400 hover:bg-neutral-800 transition duration-500">
                No
            </button>
        </div>
    </div>

    <!-- CONTENT PAGE -->
    <div id="content" class="hidden space-y-8">
        <p id="paragraphText" class="text-xl leading-loose fade"></p>

        <div class="flex justify-center gap-6">
            <button onclick="nextParagraph()" 
                class="px-6 py-2 border border-neutral-500 hover:bg-neutral-800 transition duration-500">
                Next
            </button>

            <button onclick="stopReading()" 
                class="px-6 py-2 border border-red-500 text-red-400 hover:bg-red-900/30 transition duration-500">
                Stop Reading
            </button>
        </div>
    </div>

</div>

<script>
const paragraphs = [

`Honestly, at first when I left from your house two weeks ago, I thought I could slowly let everything that happened go. Saya fikir saya boleh ikhlaskan semuanya dengan masa. Tapi ternyata saya salah. I suffered for these two weeks. The more time passed, the heavier it felt. The silence became louder than anything.`,

`The moment I said I accept your decision was because you said you could be happier without me. So I thought the best thing I could do was let you find that happiness — even if it meant sacrificing my own. I chose to step back, walaupun hati saya tak pernah benar-benar bersedia.`,

`Dari semasa ke semasa saya cuba lupakan awak. Saya sibukkan diri, pura-pura nampak kuat di depan orang. Tapi bila saya sendiri, saya tewas. Saya cari awak, saya stalk awak, saya bersedih dalam diam sampai kadang-kadang rasa hilang diri. Saya kalah dengan keadaan, dan mungkin juga kalah dengan perasaan sendiri.`,

`Banyak lagi sebenarnya yang saya nak luahkan, tapi saya tak lagi sekuat itu. Jadi ini saja yang saya mampu tanya... awak taknak berbaik dengan saya ke?`
];

let currentIndex = 0;

function startReading() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");
    showParagraph();
}

function showParagraph() {
    const textElement = document.getElementById("paragraphText");
    textElement.classList.remove("show");

    setTimeout(() => {
        textElement.innerText = paragraphs[currentIndex];
        textElement.classList.add("show");
    }, 200);
}

function nextParagraph() {
    if (currentIndex < paragraphs.length - 1) {
        currentIndex++;
        showParagraph();
    } else {
        alert("Terima kasih sebab membaca sampai akhir.");
    }
}

function stopReading() {
    alert("Kalau awak berhenti di sini, saya faham. Mungkin belum masanya untuk awak dengar semuanya. Terima kasih sebab sudi sampai tahap ini.");
    endSession();
}

function declineReading() {
    alert("Tak apa… mungkin belum masanya untuk awak membaca semua ini. Saya tetap doakan awak bahagia.");

    fetch("https://formspree.io/f/YOUR_ENDPOINT", {
        method: "POST",
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            message: "Dia pilih NO dan tidak membaca luahan."
        })
    });

    endSession();
}

function endSession() {
    document.getElementById("content").innerHTML = 
    `<p class="text-lg text-neutral-400">Luahan ini berakhir di sini.</p>`;
}
</script>

</body>
</html>
