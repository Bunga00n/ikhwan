<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luahan Hati</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Font (Matang Serif) -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cormorant Garamond', serif;
}
.fade {
    opacity: 0;
    transition: opacity 1s ease-in-out;
}
.fade.show {
    opacity: 1;
}
</style>
</head>

<body class="bg-neutral-950 text-neutral-200 min-h-screen flex items-center justify-center px-6">

<div id="app" class="max-w-2xl text-center space-y-8 fade show">

    <!-- Muka Depan -->
    <div id="intro">
        <h1 class="text-3xl md:text-4xl font-semibold leading-relaxed">
            Teruntuk awak,<br>
            sudikah awak membaca luahan saya?
        </h1>

        <div class="flex justify-center gap-6 mt-8">
            <button onclick="startReading()" 
                class="px-6 py-2 border border-neutral-400 hover:bg-neutral-800 transition duration-500">
                Yes
            </button>

            <button onclick="declineReading()" 
                class="px-6 py-2 border border-neutral-400 hover:bg-neutral-800 transition duration-500">
                No
            </button>
        </div>
    </div>

    <!-- Kandungan -->
    <div id="content" class="hidden space-y-8">
        <p id="paragraphText" class="text-xl leading-loose"></p>

        <div class="flex justify-center gap-6">
            <button onclick="nextParagraph()" 
                class="px-6 py-2 border border-neutral-500 hover:bg-neutral-800 transition duration-500">
                Next
            </button>

            <button onclick="stopReading()" 
                class="px-6 py-2 border border-red-500 text-red-400 hover:bg-red-900/30 transition duration-500">
                Stop Reading
            </button>
        </div>
    </div>

</div>

<script>
const paragraphs = [
`Honestly, at first when I left... (MASUKKAN TEKS PENUH PERENGGAN 1 DI SINI)`,

`The moments I said I accept your decision... (MASUKKAN TEKS PENUH PERENGGAN 2 DI SINI)`,

`Dari semasa ke semasa saya cuba lupakan awak... (MASUKKAN TEKS PENUH PERENGGAN 3 DI SINI)`,

`Banyak lagi saya nak luah... last soalan, awak taknak berbaik dengan saya ke?`
];

let currentIndex = 0;

function startReading() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");
    showParagraph();
}

function showParagraph() {
    const textElement = document.getElementById("paragraphText");
    textElement.classList.remove("show");
    textElement.classList.add("fade");

    setTimeout(() => {
        textElement.innerText = paragraphs[currentIndex];
        textElement.classList.add("show");
    }, 300);
}

function nextParagraph() {
    if (currentIndex < paragraphs.length - 1) {
        currentIndex++;
        showParagraph();
    } else {
        alert("Itu sahaja yang mampu saya luahkan hari ini.");
    }
}

function stopReading() {
    alert("Kalau awak berhenti di sini, saya tetap berterima kasih sebab sudi membaca sampai tahap ini.");
}

function declineReading() {
    alert("Tak apa... mungkin belum masanya untuk awak membaca semua ini.");

    // Hantar notifikasi ke Formspree
    fetch("https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT", {
        method: "POST",
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            message: "Dia tekan NO dan tidak membaca luahan."
        })
    });
}
</script>

</body>
</html>
