<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luahan Hati</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cormorant Garamond', serif;
    transition: background-color 2s ease;
}
.cursor {
    display: inline-block;
    width: 8px;
    background-color: #d4d4d4;
    animation: blink 1s infinite;
    margin-left: 3px;
}
@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}
.fade-in {
    opacity: 0;
    transition: opacity 1.5s ease;
}
.fade-in.show {
    opacity: 1;
}
</style>
</head>

<body class="bg-neutral-900 text-neutral-200 min-h-screen flex items-center justify-center px-6">

<audio id="bgMusic" loop>
    <source src="YOUR_INSTRUMENTAL_LINK.mp3" type="audio/mpeg">
</audio>

<div class="max-w-2xl text-center space-y-10">

    <!-- INTRO -->
    <div id="intro">
        <h1 class="text-3xl md:text-4xl leading-relaxed font-semibold">
            Teruntuk awak,<br>
            sudikah awak membaca luahan saya… walaupun mungkin selepas ini awak akan rasa sesuatu yang tak selesa?
        </h1>

        <div class="flex justify-center gap-6 mt-10">
            <button onclick="startReading()" 
                class="px-6 py-2 border border-neutral-400 hover:bg-neutral-800 transition duration-500">
                Yes
            </button>

            <button onclick="declineReading()" 
                class="px-6 py-2 border border-neutral-400 hover:bg-neutral-800 transition duration-500">
                No
            </button>
        </div>
    </div>

    <!-- CONTENT -->
    <div id="content" class="hidden space-y-8">
        <p id="paragraphText" class="text-xl leading-loose whitespace-pre-line"></p>

        <div id="buttons" class="flex justify-center gap-6 opacity-0 transition-opacity duration-1000">
            <button onclick="nextParagraph()" 
                class="px-6 py-2 border border-neutral-500 hover:bg-neutral-800 transition duration-500">
                Next
            </button>

            <button onclick="stopReading()" 
                class="px-6 py-2 border border-red-500 text-red-400 hover:bg-red-900/30 transition duration-500">
                Stop Reading
            </button>
        </div>
    </div>

</div>

<script>
const paragraphs = [

`Honestly, at first when I left from your house two weeks ago, I told myself I would be okay.
Saya paksa diri untuk percaya yang masa akan buat saya reda.
Tapi setiap malam jadi lebih panjang daripada biasa.
Saya tidur dengan fikiran yang tak pernah sunyi.

I thought distance would make it easier.
Rupanya jarak cuma buat saya rasa kehilangan itu lebih jelas.

Dua minggu ini, saya senyum depan orang…
tapi dalam diam, saya perlahan-lahan hancur.`,

`The moment I said I accept your decision…
bukan sebab saya betul-betul kuat.

It was because you said you could be happier without me.

Dan waktu itu, saya rasa kalau saya betul-betul sayangkan awak,
saya kena lepaskan awak.

Even if it meant I had to sacrifice my own happiness.

Saya pura-pura redha,
tapi hakikatnya hati saya tak pernah benar-benar setuju.`,

`Dari semasa ke semasa saya cuba lupakan awak.
Saya sibukkan diri, keluar dengan orang, ketawa macam biasa.

Tapi bila saya sendiri…
saya kalah.

Saya cari awak.
Saya tengok gambar lama.
Saya stalk awak walaupun setiap kali itu buat dada saya lebih sakit.

Kadang-kadang saya rasa macam saya hilang diri sendiri.

Saya tak sangka kehilangan awak akan buat saya serapuh ini.`,

`Banyak lagi sebenarnya yang saya simpan.
Banyak yang saya tak mampu tulis sebab setiap perkataan terasa berat.

Tapi sebelum saya diam sepenuhnya…

saya cuma nak tanya satu benda.

Awak betul-betul taknak berbaik dengan saya ke?

Atau sebenarnya… awak cuma dah tak rasa apa-apa?`
];

let currentIndex = 0;

function startReading() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");
    document.getElementById("bgMusic").play();
    darkenBackground();
    typeWriter(paragraphs[currentIndex]);
}

function typeWriter(text) {
    let i = 0;
    const element = document.getElementById("paragraphText");
    const buttons = document.getElementById("buttons");
    element.innerHTML = "";
    buttons.style.opacity = 0;

    function typing() {
        if (i < text.length) {
            element.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
            let speed = 35;

            if (text.charAt(i) === '.' || text.charAt(i) === ',') speed = 200;
            if (text.charAt(i) === '\n') speed = 300;

            i++;
            setTimeout(typing, speed);
        } else {
            element.innerHTML = text;
            buttons.style.opacity = 1;
        }
    }
    typing();
}

function nextParagraph() {
    if (currentIndex < paragraphs.length - 1) {
        currentIndex++;
        darkenBackground();
        typeWriter(paragraphs[currentIndex]);
    } else {
        alert("Terima kasih sebab membaca sampai akhir.");
    }
}

function stopReading() {
    alert("Saya faham kalau awak tak sanggup teruskan. Tapi percayalah… saya tak pernah ada butang untuk berhenti rasa semua ini.");
    endSession();
}

function declineReading() {
    alert("Tak apa… mungkin membaca ini pun terlalu berat untuk awak. Cuma bezanya, saya tak pernah ada pilihan untuk berhenti rasa semua ini.");

    fetch("https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: "Dia pilih NO dan tidak membaca luahan." })
    });

    endSession();
}

function endSession() {
    document.getElementById("content").innerHTML =
    `<p class="text-lg text-neutral-400">Luahan ini berakhir di sini.</p>`;
}

function darkenBackground() {
    const shades = ["#171717", "#111111", "#0d0d0d", "#080808"];
    document.body.style.backgroundColor = shades[currentIndex] || "#050505";
}
</script>

</body>
</html>
